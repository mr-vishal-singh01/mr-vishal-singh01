name: Metrics
on:
  schedule: [{cron: '0 0 * * *'}]
  workflow_dispatch:
  push: {branches: ['master', 'main']}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: mr-vishal-singh01
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: UTC
